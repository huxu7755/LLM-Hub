name: 构建 Android 应用

on:
  push:
    branches: [ main, openclaw-bak ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 构建 Android APK/AAB
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      GRADLE_OPTS: "-Xmx6g -Xms2g -Dorg.gradle.parallel=false -Dorg.gradle.caching=true"
      JAVA_OPTS: "-Xmx6g"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码（跳过子模块）
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Android SDK 工具
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          accept-android-sdk-licenses: true
          packages: |
            platforms;android-36
            build-tools;34.0.0
            ndk;26.1.10909125
            cmake;3.22.1
            platform-tools

      - name: 设置 Gradle 可执行权限
        run: chmod +x android/gradlew

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle.kts', 'android/app/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 创建空的 local.properties
        run: echo "" > android/local.properties

      - name: 构建 Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon 2>&1
        timeout-minutes: 60

      - name: 构建 Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon 2>&1
        timeout-minutes: 90

      - name: 构建 Release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon 2>&1
        timeout-minutes: 90

      - name: 列出构建输出目录
        run: find android/app/build/outputs -type f -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No build outputs found"

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: 上传 Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab