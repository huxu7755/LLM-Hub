name: Build Android App

on:
  push:
    branches: [ main, openclaw-bak ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      GRADLE_OPTS: "-Xmx4g -Xms2g -Dorg.gradle.jvmargs=-Xmx4g"
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set Gradle executable permissions
        run: chmod +x android/gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle.kts', 'android/app/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -Pandroid.injected.signing.store.file=/dev/null
        env:
          JAVA_OPTS: "-Xmx4g"

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon -Pandroid.injected.signing.store.file=/dev/null
        env:
          JAVA_OPTS: "-Xmx4g"

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon -Pandroid.injected.signing.store.file=/dev/null
        env:
          JAVA_OPTS: "-Xmx4g"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab